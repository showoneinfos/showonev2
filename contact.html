<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nous contacter — ShowOne</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #fff; color: #111; min-height: 100vh; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 40px; border-bottom: 1px solid #f0f0f0; }
    .logo { font-size: 20px; font-weight: 900; color: #111; text-decoration: none; letter-spacing: -0.5px; }
    .logo span { color: #E8383A; }
    .btn-back { font-size: 13px; color: #999; text-decoration: none; }
    .btn-back:hover { color: #111; }
    .main { max-width: 560px; margin: 0 auto; padding: 60px 20px; }
    h1 { font-size: 36px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; }
    .sub { font-size: 15px; color: #999; margin-bottom: 36px; line-height: 1.6; }
    .contact-info { display: flex; gap: 10px; align-items: center; padding: 14px 16px; border: 1px solid #f0f0f0; border-radius: 10px; margin-bottom: 28px; }
    .contact-info a { color: #E8383A; font-size: 14px; font-weight: 600; text-decoration: none; }
    .contact-info span { font-size: 12px; color: #bbb; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select, textarea { width: 100%; padding: 12px 14px; border: 1.5px solid #e8e8e8; border-radius: 9px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; color: #111; background: #fff; }
    input:focus, select:focus, textarea:focus { border-color: #111; }
    input::placeholder, textarea::placeholder { color: #ccc; }
    textarea { resize: vertical; min-height: 110px; }
    .section-extra { display: none; background: #f8f8f8; border-radius: 9px; padding: 14px; margin-bottom: 14px; }
    .section-extra .form-group { margin-bottom: 10px; }
    .btn-submit { width: 100%; padding: 14px; border-radius: 10px; background: #111; color: #fff; border: none; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 6px; }
    .btn-submit:hover { background: #333; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
    .success-box { display: none; text-align: center; padding: 40px 20px; }
    .success-icon { font-size: 48px; margin-bottom: 16px; }
    .success-title { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 8px; }
    .success-sub { font-size: 14px; color: #999; line-height: 1.6; }
    @media (max-width: 600px) { nav { padding: 14px 20px; } .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Show<span>One</span></a>
  <a href="/" class="btn-back">← Retour</a>
</nav>
<div class="main">
  <h1>Nous contacter</h1>
  <p class="sub">Une question, un problème ou une idée ? Notre équipe vous répond rapidement.</p>

  <div class="contact-info">
    <span style="font-size:20px;">📧</span>
    <div>
      <a href="mailto:showone.infos@gmail.com">showone.infos@gmail.com</a><br>
      <span>Réponse sous 24-48h</span>
    </div>
  </div>

  <div id="contactForm">
    <div class="form-row">
      <div class="form-group"><label>Prénom *</label><input type="text" id="contactPrenom" placeholder="Marie"></div>
      <div class="form-group"><label>Nom *</label><input type="text" id="contactNom" placeholder="Dupont"></div>
    </div>
    <div class="form-group"><label>Email *</label><input type="email" id="contactEmail" placeholder="marie@email.com"></div>
    <div class="form-group">
      <label>Sujet *</label>
      <select id="contactSujet" onchange="changerSujet()">
        <option value="">-- Choisir un sujet --</option>
        <option value="infos">ℹ️ Demande d'informations</option>
        <option value="compte">👤 Problème de compte</option>
        <option value="technique">🔧 Problème technique</option>
        <option value="mineur">👶 Inscription mineur</option>
        <option value="categorie">🎭 Suggérer une catégorie</option>
        <option value="partenariat">🤝 Partenariat</option>
        <option value="autre">💬 Autre</option>
      </select>
    </div>

    <div class="section-extra" id="sectionMineur">
      <div class="form-group"><label>Prénom du mineur *</label><input type="text" id="mineurPrenomContact" placeholder="Lucas"></div>
      <div class="form-group"><label>Date de naissance *</label><input type="date" id="mineurDobContact"></div>
      <div class="form-group"><label>Catégorie souhaitée</label><input type="text" id="mineurCatContact" placeholder="Ex : Danse, Chant…"></div>
    </div>

    <div class="section-extra" id="sectionCategorie">
      <div class="form-group"><label>Nom de la catégorie *</label><input type="text" id="catNom" placeholder="Ex : Cirque, Magie…"></div>
      <div class="form-group"><label>Pourquoi cette catégorie ?</label><input type="text" id="catRaison" placeholder="Ex : Beaucoup de talents dans ce domaine"></div>
    </div>

    <div class="form-group"><label>Message *</label><textarea id="contactMessage" placeholder="Décrivez votre demande en détail…"></textarea></div>
    <button class="btn-submit" id="btnSubmit" onclick="envoyerContact()">Envoyer le message →</button>
  </div>

  <div class="success-box" id="successMsg">
    <div class="success-icon">✅</div>
    <div class="success-title">Message envoyé !</div>
    <p class="success-sub">Votre client mail va s'ouvrir. Nous répondrons à <strong id="emailConfirm"></strong> dans les 24-48h.</p>
  </div>
</div>

<script>
  function changerSujet() {
    const sujet = document.getElementById('contactSujet').value;
    document.getElementById('sectionMineur').style.display = sujet === 'mineur' ? 'block' : 'none';
    document.getElementById('sectionCategorie').style.display = sujet === 'categorie' ? 'block' : 'none';
    const placeholders = {
      mineur: 'Décrivez votre situation (prénom du mineur, catégorie souhaitée, questions)…',
      infos: "Quelle information recherchez-vous ?",
      categorie: 'Décrivez la catégorie souhaitée et pourquoi…',
      compte: 'Décrivez le problème avec votre compte…',
      technique: 'Décrivez le problème technique rencontré…',
      partenariat: 'Décrivez votre projet de partenariat avec ShowOne…',
      autre: 'Décrivez votre demande en détail…'
    };
    document.getElementById('contactMessage').placeholder = placeholders[sujet] || 'Décrivez votre demande en détail…';
  }

  function envoyerContact() {
    const prenom = document.getElementById('contactPrenom').value.trim();
    const nom = document.getElementById('contactNom').value.trim();
    const email = document.getElementById('contactEmail').value.trim();
    const sujet = document.getElementById('contactSujet').value;
    const message = document.getElementById('contactMessage').value.trim();
    if (!prenom || !nom || !email || !sujet || !message) { alert('Veuillez remplir tous les champs obligatoires.'); return; }
    if (!email.includes('@')) { alert('Veuillez entrer une adresse email valide.'); return; }
    const btn = document.getElementById('btnSubmit');
    btn.textContent = 'Envoi en cours…'; btn.disabled = true;
    const sujets = { mineur:'Dossier mineur', infos:"Demande d'informations", categorie:'Ajout nouvelle catégorie', compte:'Problème de compte', technique:'Problème technique', partenariat:'Partenariat', autre:'Autre demande' };
    let corps = `Prénom : ${prenom}\nNom : ${nom}\nEmail : ${email}\nDemande : ${sujets[sujet]||sujet}\n\n`;
    if (sujet === 'mineur') {
      const pm = document.getElementById('mineurPrenomContact').value.trim();
      const dm = document.getElementById('mineurDobContact').value;
      const cm = document.getElementById('mineurCatContact').value.trim();
      if (pm) corps += `Prénom mineur : ${pm}\n`;
      if (dm) corps += `Date naissance : ${dm}\n`;
      if (cm) corps += `Catégorie : ${cm}\n`;
      corps += '\n';
    }
    if (sujet === 'categorie') {
      const cn = document.getElementById('catNom').value.trim();
      const cr = document.getElementById('catRaison').value.trim();
      if (cn) corps += `Catégorie : ${cn}\n`;
      if (cr) corps += `Raison : ${cr}\n`;
      corps += '\n';
    }
    corps += `Message :\n${message}`;
    window.location.href = `mailto:showone.infos@gmail.com?subject=${encodeURIComponent('[ShowOne] '+(sujets[sujet]||sujet))}&body=${encodeURIComponent(corps)}`;
    setTimeout(() => {
      document.getElementById('contactForm').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
      document.getElementById('emailConfirm').textContent = email;
    }, 800);
  }
</script>
</body>
</html>
