<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messagerie — ShowOne</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #fff; color: #111; display: flex; height: 100vh; overflow: hidden; }

    /* SIDEBAR */
    .sidebar { width: 220px; background: #fff; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-logo { padding: 20px; border-bottom: 1px solid #f0f0f0; }
    .sidebar-logo a { font-size: 18px; font-weight: 900; color: #111; text-decoration: none; }
    .sidebar-logo a span { color: #E8383A; }
    .sidebar-avatar { padding: 14px 18px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f0f0f0; }
    .side-av { width: 36px; height: 36px; border-radius: 50%; background: #111; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 700; flex-shrink: 0; overflow: hidden; }
    .side-nom { font-size: 13px; font-weight: 700; color: #111; }
    .side-role { font-size: 11px; color: #bbb; }
    .sidebar-nav { padding: 10px 10px; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 9px 10px; border-radius: 8px; cursor: pointer; color: #888; font-size: 13px; font-weight: 500; text-decoration: none; transition: all 0.15s; }
    .nav-item:hover { background: #f8f8f8; color: #111; }
    .nav-item.active { background: #f0f0f0; color: #111; font-weight: 700; }
    .sidebar-bottom { padding: 10px; border-top: 1px solid #f0f0f0; }
    .nav-item-danger { color: #E8383A; }
    .nav-item-danger:hover { background: #fff0f0; }

    /* PANEL CONVERSATIONS */
    .conv-panel { width: 300px; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; flex-shrink: 0; }
    .conv-header { padding: 16px 18px; border-bottom: 1px solid #f0f0f0; }
    .conv-header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .conv-title { font-size: 15px; font-weight: 700; }
    .btn-new { padding: 6px 12px; border-radius: 7px; border: none; background: #111; color: #fff; font-size: 11px; font-weight: 700; cursor: pointer; display: none; }
    .search-conv { width: 100%; padding: 9px 12px; border: 1px solid #e8e8e8; border-radius: 8px; font-size: 12px; font-family: 'Inter', sans-serif; outline: none; color: #111; }
    .search-conv:focus { border-color: #111; }
    .conv-list { flex: 1; overflow-y: auto; }
    .conv-item { display: flex; gap: 10px; align-items: flex-start; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f8f8f8; transition: background 0.1s; }
    .conv-item:hover { background: #fafafa; }
    .conv-item.active { background: #f5f5f5; }
    .conv-avatar { width: 38px; height: 38px; border-radius: 50%; background: #111; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 700; flex-shrink: 0; overflow: hidden; }
    .conv-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .conv-info { flex: 1; min-width: 0; }
    .conv-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
    .conv-name { font-size: 13px; font-weight: 700; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-time { font-size: 11px; color: #bbb; flex-shrink: 0; }
    .conv-preview { font-size: 12px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-dot { width: 8px; height: 8px; border-radius: 50%; background: #E8383A; flex-shrink: 0; margin-top: 4px; }
    .conv-empty { text-align: center; padding: 40px 20px; color: #bbb; font-size: 13px; }

    /* VUE CONVERSATION */
    .conv-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .conv-placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 14px; text-align: center; padding: 40px; }
    .conv-active { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .conv-active-header { padding: 14px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; }
    .h-av { width: 40px; height: 40px; border-radius: 50%; background: #111; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; flex-shrink: 0; overflow: hidden; }
    .h-av img { width: 100%; height: 100%; object-fit: cover; }
    .h-nom { font-size: 14px; font-weight: 700; }
    .h-sub { font-size: 12px; color: #bbb; }
    .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg-date { text-align: center; font-size: 11px; color: #bbb; padding: 4px 12px; background: #f8f8f8; border-radius: 100px; margin: 4px auto; width: fit-content; }
    .msg-wrap { display: flex; gap: 8px; align-items: flex-end; }
    .msg-wrap.sent { flex-direction: row-reverse; }
    .msg-av { width: 28px; height: 28px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #555; flex-shrink: 0; }
    .msg-wrap.sent .msg-av { background: #111; color: #fff; }
    .msg-bubble { max-width: 70%; padding: 10px 13px; border-radius: 12px; font-size: 13px; line-height: 1.6; background: #f5f5f5; color: #111; }
    .msg-bubble.sent { background: #111; color: #fff; border-radius: 12px 12px 3px 12px; }
    .msg-bubble.recv { border-radius: 12px 12px 12px 3px; }
    .msg-objet { font-size: 11px; font-weight: 600; color: #E8383A; margin-bottom: 4px; }
    .msg-wrap.sent .msg-objet { color: rgba(255,255,255,0.6); }
    .msg-time { font-size: 10px; color: #bbb; margin-top: 4px; text-align: right; }
    .msg-wrap.sent .msg-time { color: rgba(255,255,255,0.5); }
    .reply-bar { padding: 14px 18px; border-top: 1px solid #f0f0f0; display: flex; gap: 10px; align-items: flex-end; }
    .reply-ta { flex: 1; padding: 10px 13px; border: 1px solid #e8e8e8; border-radius: 10px; font-size: 13px; font-family: 'Inter', sans-serif; outline: none; color: #111; resize: none; min-height: 42px; max-height: 120px; line-height: 1.5; }
    .reply-ta:focus { border-color: #111; }
    .btn-reply { padding: 10px 18px; border-radius: 9px; border: none; background: #111; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }

    /* MODAL NOUVEAU MESSAGE */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 28px; width: 100%; max-width: 420px; }
    .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .modal-head h2 { font-size: 18px; font-weight: 900; }
    .modal-close { width: 30px; height: 30px; border-radius: 7px; border: 1px solid #e8e8e8; background: transparent; cursor: pointer; font-size: 14px; }
    .modal-label { font-size: 12px; font-weight: 600; color: #555; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .modal-select { width: 100%; padding: 10px 12px; border: 1px solid #e8e8e8; border-radius: 8px; font-size: 13px; font-family: 'Inter', sans-serif; outline: none; color: #111; margin-bottom: 12px; }
    .modal-input { width: 100%; padding: 10px 12px; border: 1px solid #e8e8e8; border-radius: 8px; font-size: 13px; font-family: 'Inter', sans-serif; outline: none; color: #111; margin-bottom: 10px; }
    .modal-textarea { width: 100%; padding: 10px 12px; border: 1px solid #e8e8e8; border-radius: 8px; font-size: 13px; font-family: 'Inter', sans-serif; outline: none; resize: vertical; min-height: 80px; color: #111; margin-bottom: 14px; }
    .modal-input:focus, .modal-select:focus, .modal-textarea:focus { border-color: #111; }
    .modal-btns { display: flex; gap: 10px; }
    .btn-cancel { padding: 10px 16px; border-radius: 8px; border: 1px solid #e8e8e8; background: transparent; font-size: 13px; font-weight: 600; cursor: pointer; color: #999; }
    .btn-send { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #111; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; }

    /* MOBILE */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .conv-panel { width: 100%; border-right: none; }
      .conv-view { display: none; position: fixed; inset: 0; background: #fff; z-index: 50; flex-direction: column; }
      .conv-view.mobile-open { display: flex; }
      .mobile-back { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 13px; font-weight: 600; color: #111; }
    }
    @media (min-width: 769px) {
      .conv-view { display: flex !important; }
      .mobile-back { display: none; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo"><a href="/">Show<span>One</span></a></div>
  <div class="sidebar-avatar">
    <div class="side-av" id="sideAv">?</div>
    <div><div class="side-nom" id="sideNom">—</div><div class="side-role" id="sideRole">—</div></div>
  </div>
  <nav class="sidebar-nav" id="sideNav"></nav>
  <div class="sidebar-bottom">
    <a href="#" onclick="deconnecter()" class="nav-item nav-item-danger">🚪 Déconnexion</a>
  </div>
</div>

<!-- PANEL CONVERSATIONS -->
<div class="conv-panel">
  <div class="conv-header">
    <div class="conv-header-top">
      <div class="conv-title">💬 Messages</div>
      <button class="btn-new" id="btnNew" onclick="ouvrirModal('')">+ Nouveau</button>
    </div>
    <input class="search-conv" type="text" placeholder="Rechercher…" oninput="filtrer(this.value)">
  </div>
  <div class="conv-list" id="convItems">
    <div class="conv-empty">Chargement…</div>
  </div>
</div>

<!-- VUE CONVERSATION -->
<div class="conv-view" id="convView">
  <div class="mobile-back" onclick="fermerConvMobile()">← Retour</div>
  <div class="conv-placeholder" id="placeholder">
    <div>
      <div style="font-size:36px;margin-bottom:12px;">💬</div>
      <div style="font-weight:700;margin-bottom:6px;">Sélectionnez une conversation</div>
      <div style="font-size:13px;">Choisissez une conversation dans la liste.</div>
    </div>
  </div>
  <div class="conv-active" id="convActive">
    <div class="conv-active-header">
      <div class="h-av" id="hAv">?</div>
      <div><div class="h-nom" id="hNom">—</div><div class="h-sub" id="hSub"></div></div>
    </div>
    <div class="msg-area" id="msgArea"></div>
    <div class="reply-bar">
      <textarea class="reply-ta" id="replyTa" placeholder="Écrire un message…" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();envoyer();}"></textarea>
      <button class="btn-reply" id="btnReply" onclick="envoyer()">Envoyer →</button>
    </div>
  </div>
</div>

<!-- MODAL NOUVEAU MESSAGE -->
<div class="modal-overlay" id="modalOv">
  <div class="modal">
    <div class="modal-head"><h2>Nouveau message</h2><button class="modal-close" onclick="fermerModal()">✕</button></div>
    <label class="modal-label">Talent</label>
    <select class="modal-select" id="selTalent"></select>
    <label class="modal-label">Objet</label>
    <input class="modal-input" id="newObjet" type="text" placeholder="Ex : Proposition de casting">
    <label class="modal-label">Message</label>
    <textarea class="modal-textarea" id="newContenu" placeholder="Bonjour, nous avons découvert votre profil…"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="fermerModal()">Annuler</button>
      <button class="btn-send" onclick="envoyerNouveauMsg()">Envoyer ✓</button>
    </div>
  </div>
</div>

<script>
const SB = 'https://emiuzigtlomlrsofxqyf.supabase.co';
const KEY = 'sb_publishable_U8P52zBkzF6Nqno_mmbcVQ_bKQLNmTP';
let role = null, profilId = null, token = null, convs = [], convActive = null;

function toggleSidebarMsg() { document.querySelector('.sidebar').classList.toggle('open'); }
function fermerConvMobile() { document.getElementById('convView').classList.remove('mobile-open'); }

async function get(url) {
  const r = await fetch(SB+url, { headers: { apikey: KEY, Authorization: 'Bearer '+token } });
  const d = await r.json(); return Array.isArray(d) ? d : [];
}
async function post(url, body) {
  return fetch(SB+url, { method:'POST', headers:{'Content-Type':'application/json',apikey:KEY,Authorization:'Bearer '+token,Prefer:'return=minimal'}, body:JSON.stringify(body) });
}

async function init() {
  token = localStorage.getItem('showone_token');
  const us = localStorage.getItem('showone_user');
  if (!token || !us) { location.href='/connexion'; return; }
  const u = JSON.parse(us); role = u.type_compte||'talent';
  document.getElementById('sideNom').textContent = ((u.prenom||'')+' '+(u.nom||'')).trim()||u.email;
  document.getElementById('sideRole').textContent = role==='recruteur'?'Recruteur':'Talent';
  if (u.photo_url) document.getElementById('sideAv').innerHTML=`<img src="${u.photo_url}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">`;
  else document.getElementById('sideAv').textContent=((u.prenom?.[0]||'')+(u.nom?.[0]||'')).toUpperCase()||'?';
  const nav = document.getElementById('sideNav');
  if (role==='recruteur') { nav.innerHTML=`<a href="dashboard-recruteur.html" class="nav-item">🏠 Tableau de bord</a><a href="messagerie.html" class="nav-item active">💬 Messagerie</a><a href="categories.html" class="nav-item">🔍 Talents</a>`; document.getElementById('btnNew').style.display='block'; }
  else { nav.innerHTML=`<a href="dashboard-talent.html" class="nav-item">🏠 Tableau de bord</a><a href="messagerie.html" class="nav-item active">💬 Messagerie</a><a href="castings.html" class="nav-item">🎬 Castings</a>`; }
  if (role==='recruteur') { const d=await get(`/rest/v1/profils_recruteurs?utilisateur_id=eq.${u.id}&select=id&limit=1`); profilId=d[0]?.id; }
  else { const d=await get(`/rest/v1/profils_talents?utilisateur_id=eq.${u.id}&select=id&limit=1`); profilId=d[0]?.id; }
  await charger();
  const p = new URLSearchParams(location.search);
  if (p.get('talent_id') && role==='recruteur') ouvrirModal(p.get('talent_id'));
}

async function charger() {
  const el = document.getElementById('convItems'); el.innerHTML='<div class="conv-empty">Chargement…</div>';
  if (!profilId) { el.innerHTML='<div class="conv-empty">Profil introuvable.</div>'; return; }
  const filtre = role==='talent'?`talent_id=eq.${profilId}`:`recruteur_id=eq.${profilId}`;
  const msgs = await get(`/rest/v1/messages?${filtre}&select=id,recruteur_id,talent_id,objet,contenu,lu,created_at&order=created_at.desc`);
  if (!msgs.length) { el.innerHTML='<div class="conv-empty">Aucune conversation.</div>'; return; }
  const map = {};
  msgs.forEach(m => { if(!m.recruteur_id||!m.talent_id) return; const k=m.recruteur_id+'__'+m.talent_id; if(!map[k]) map[k]={k,rId:m.recruteur_id,tId:m.talent_id,last:m,unread:0,nom:'…',photo:null}; if(new Date(m.created_at)>new Date(map[k].last.created_at)) map[k].last=m; if(!m.lu&&role==='talent') map[k].unread++; });
  convs = Object.values(map).sort((a,b)=>new Date(b.last.created_at)-new Date(a.last.created_at));
  afficher(convs);
  for (const c of convs) {
    const autreId=role==='talent'?c.rId:c.tId; const table=role==='talent'?'profils_recruteurs':'profils_talents'; const champs=role==='talent'?'id,nom_entreprise,photo_url,utilisateur_id':'id,nom_scene,photo_url,utilisateur_id';
    const d=await get(`/rest/v1/${table}?id=eq.${autreId}&select=${champs}&limit=1`);
    if (d.length) { c.photo=d[0].photo_url; if(role==='talent'){c.nom=d[0].nom_entreprise||'Recruteur';if(!d[0].nom_entreprise&&d[0].utilisateur_id){const u2=await get(`/rest/v1/utilisateurs?id=eq.${d[0].utilisateur_id}&select=prenom,nom&limit=1`);if(u2.length)c.nom=((u2[0].prenom||'')+' '+(u2[0].nom||'')).trim()||'Recruteur';}}else{c.nom=d[0].nom_scene||'Talent';} }
    afficher(convs);
  }
}

function afficher(liste) {
  const el = document.getElementById('convItems');
  if (!liste.length) { el.innerHTML='<div class="conv-empty">Aucune conversation.</div>'; return; }
  el.innerHTML = liste.map(c => {
    const ini=(c.nom[0]||'?').toUpperCase(); const d=new Date(c.last.created_at); const dh=Math.round((Date.now()-d)/36e5);
    const t=dh<1?"À l'instant":dh<24?dh+'h':dh<48?'Hier':d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
    return `<div class="conv-item ${convActive===c.k?'active':''}" data-k="${c.k}" data-r="${c.rId}" data-t="${c.tId}" onclick="ouvrir(this)">
      <div class="conv-avatar">${c.photo?`<img src="${c.photo}">`:(ini)}</div>
      <div class="conv-info"><div class="conv-top"><div class="conv-name">${c.nom}</div><div class="conv-time">${t}</div></div><div class="conv-preview">${c.last.objet?c.last.objet+' — ':''}${c.last.contenu}</div></div>
      ${c.unread?'<div class="conv-dot"></div>':''}
    </div>`;
  }).join('');
}

let _lastTouch = 0;
async function ouvrir(el) {
  const now=Date.now(); if(now-_lastTouch<300) return; _lastTouch=now;
  if (window.innerWidth<=768) document.getElementById('convView').classList.add('mobile-open');
  const rId=el.dataset.r; const tId=el.dataset.t; const k=el.dataset.k; convActive=k;
  const c=convs.find(x=>x.k===k);
  document.getElementById('hNom').textContent=c?.nom||(role==='talent'?'Recruteur':'Talent');
  document.getElementById('hSub').textContent=role==='talent'?'Recruteur':'Talent ShowOne';
  const hAv=document.getElementById('hAv'); hAv.innerHTML=c?.photo?`<img src="${c.photo}" style="width:40px;height:40px;object-fit:cover;">`:(c?.nom?.[0]||'?').toUpperCase();
  document.querySelectorAll('.conv-item').forEach(x=>x.classList.toggle('active',x.dataset.k===k));
  const thread=await get(`/rest/v1/messages?recruteur_id=eq.${rId}&talent_id=eq.${tId}&order=created_at.asc&select=*`);
  if(role==='talent'&&thread.some(m=>!m.lu)){await fetch(`${SB}/rest/v1/messages?recruteur_id=eq.${rId}&talent_id=eq.${tId}&lu=eq.false`,{method:'PATCH',headers:{'Content-Type':'application/json',apikey:KEY,Authorization:'Bearer '+token,Prefer:'return=minimal'},body:JSON.stringify({lu:true})});if(c)c.unread=0;afficher(convs);}
  const area=document.getElementById('msgArea'); area.innerHTML=''; let lastDate=null;
  thread.forEach(m=>{
    const d=new Date(m.created_at); const ds=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    if(ds!==lastDate){area.innerHTML+=`<div class="msg-date">${ds}</div>`;lastDate=ds;}
    const isSent=(m.objet||'').startsWith('RE:')?role==='talent':role==='recruteur';
    const t=d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    area.innerHTML+=`<div class="msg-wrap ${isSent?'sent':''}"><div class="msg-av">${isSent?'M':'R'}</div><div class="msg-bubble ${isSent?'sent':'recv'}">${m.objet&&!m.objet.startsWith('RE:')?`<div class="msg-objet">📌 ${m.objet}</div>`:''} ${m.contenu}<div class="msg-time">${t}</div></div></div>`;
  });
  area.scrollTop=area.scrollHeight;
  document.getElementById('replyTa').dataset.rId=rId; document.getElementById('replyTa').dataset.tId=tId; document.getElementById('replyTa').dataset.objet=c?.last?.objet||'';
  document.getElementById('placeholder').style.display='none'; const ca=document.getElementById('convActive'); ca.style.display='flex';
}

async function envoyer() {
  const ta=document.getElementById('replyTa'); const contenu=ta.value.trim(); if(!contenu) return;
  const rId=ta.dataset.rId; const tId=ta.dataset.tId; const objet='RE: '+(ta.dataset.objet||'Message');
  document.getElementById('btnReply').disabled=true;
  await post('/rest/v1/messages',{recruteur_id:rId,talent_id:tId,objet,contenu,lu:false});
  ta.value=''; ta.style.height='auto'; document.getElementById('btnReply').disabled=false;
  const el=document.querySelector(`.conv-item[data-r="${rId}"][data-t="${tId}"]`); if(el) await ouvrir(el);
  await charger();
}

function filtrer(q) { if(!q){afficher(convs);return;} afficher(convs.filter(c=>c.nom.toLowerCase().includes(q.toLowerCase())||(c.last.objet||'').toLowerCase().includes(q.toLowerCase()))); }

async function ouvrirModal(preId) {
  document.getElementById('modalOv').classList.add('open');
  const d=await get('/rest/v1/profils_talents?select=id,nom_scene&order=nom_scene.asc');
  const sel=document.getElementById('selTalent'); sel.innerHTML='<option value="">Choisir un talent…</option>'+d.map(t=>`<option value="${t.id}" ${t.id===preId?'selected':''}>${t.nom_scene||t.id}</option>`).join('');
}
function fermerModal() { document.getElementById('modalOv').classList.remove('open'); }

async function envoyerNouveauMsg() {
  const tId=document.getElementById('selTalent').value; const objet=document.getElementById('newObjet').value.trim()||'Message'; const contenu=document.getElementById('newContenu').value.trim();
  if(!tId||!contenu){alert('Remplissez tous les champs.');return;}
  await post('/rest/v1/messages',{recruteur_id:profilId,talent_id:tId,objet,contenu,lu:false});
  fermerModal(); document.getElementById('newObjet').value=''; document.getElementById('newContenu').value='';
  await charger(); const el=document.querySelector(`.conv-item[data-r="${profilId}"][data-t="${tId}"]`); if(el) setTimeout(()=>ouvrir(el),300);
}
