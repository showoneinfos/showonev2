<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShowOne — La plateforme des talents</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: #fff; color: #111; display: flex; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px; height: 100vh;
      position: fixed; left: 0; top: 0;
      background: #fff; border-right: 1px solid #f0f0f0;
      display: flex; flex-direction: column;
      padding: 18px 12px 14px; z-index: 50;
    }
    .logo { font-size: 21px; font-weight: 900; color: #111; text-decoration: none; letter-spacing: -0.5px; margin-bottom: 14px; display: block; }
    .logo span { color: #E8383A; }

    .side-nav { display: flex; flex-direction: column; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 8px; border-radius: 7px;
      font-size: 14px; font-weight: 600; color: #111;
      text-decoration: none; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .nav-item:hover { background: #f5f5f5; }
    .nav-item.active { font-weight: 800; }
    .nav-item.nav-red { color: #E8383A; }
    .nav-item.nav-small { font-size: 13px; font-weight: 400; color: #888; }
    .nav-item.nav-small:hover { color: #111; }
    .nav-divider { height: 1px; background: #f0f0f0; margin: 6px 4px; }

    .side-bottom { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
    .btn-join { display: block; width: 100%; padding: 10px; border-radius: 8px; background: #E8383A; color: #fff; border: none; font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; }
    .btn-conn { display: block; width: 100%; padding: 9px; border-radius: 8px; background: transparent; color: #111; border: 1.5px solid #ddd; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; }
    .side-user { display: flex; align-items: center; gap: 8px; }
    .side-av { width: 30px; height: 30px; border-radius: 50%; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .side-nom { font-size: 13px; font-weight: 700; color: #111; }
    .side-role { font-size: 11px; color: #bbb; }
    .side-copy { font-size: 11px; color: #ccc; padding: 2px 8px; }

    /* ── MAIN ── */
    .main { margin-left: 220px; flex: 1; overflow-y: auto; height: 100vh; }

    /* Filtres */
    .cats { display: flex; gap: 6px; padding: 10px 14px; border-bottom: 1px solid #f0f0f0; overflow-x: auto; position: sticky; top: 0; background: #fff; z-index: 10; }
    .cats::-webkit-scrollbar { display: none; }
    .chip { padding: 5px 14px; border-radius: 100px; font-size: 11px; font-weight: 600; white-space: nowrap; border: 1px solid #e8e8e8; color: #888; cursor: pointer; background: #fff; flex-shrink: 0; }
    .chip.active { background: #111; border-color: #111; color: #fff; }

    /* Section header */
    .sec-head { padding: 16px 14px 10px; display: flex; align-items: baseline; gap: 8px; }
    .sec-title { font-size: 15px; font-weight: 900; color: #111; letter-spacing: -0.3px; }
    .sec-count { font-size: 12px; color: #bbb; }

    /* Grille */
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; padding: 0 2px 2px; }

    /* Card thumbnail */
    .tcard { position: relative; aspect-ratio: 3/4; overflow: hidden; cursor: pointer; background: #f0f0f0; }
    .tcard img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .tcard-bg { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: rgba(0,0,0,0.08); font-weight: 900; }
    .tcard-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 55%); }
    .tcard-views { position: absolute; top: 7px; left: 7px; font-size: 11px; font-weight: 700; color: #fff; background: rgba(0,0,0,0.5); padding: 2px 7px; border-radius: 100px; }
    .tcard-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 34px; height: 34px; border-radius: 50%; background: rgba(232,56,58,0.85); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; opacity: 0; transition: opacity 0.15s; }
    .tcard:hover .tcard-play { opacity: 1; }
    .tcard-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px 8px 0; }
    .tcard-name { font-size: 12px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tcard-cat { font-size: 10px; color: rgba(255,255,255,0.65); margin-bottom: 5px; }
    .tcard-btn { display: block; width: 100%; padding: 5px; background: #E8383A; color: #fff; border: none; font-size: 10px; font-weight: 700; cursor: pointer; text-align: center; }

    /* Séparateur section */
    .sec-sep { height: 8px; background: #f5f5f5; margin: 12px 0 0; }

    /* Modal */
    .modal-ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 1000; align-items: center; justify-content: center; }
    .modal-ov.open { display: flex; }
    .modal-box { background: #fff; border-radius: 14px; overflow: hidden; width: 100%; max-width: 360px; margin: 20px; position: relative; }
    .modal-close { position: absolute; top: 10px; right: 10px; width: 28px; height: 28px; border-radius: 50%; background: rgba(0,0,0,0.5); color: #fff; border: none; font-size: 13px; cursor: pointer; z-index: 5; display: flex; align-items: center; justify-content: center; }
    .modal-vid { aspect-ratio: 9/16; background: #000; }
    .modal-vid video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .modal-info { padding: 12px 14px 14px; }
    .modal-name { font-size: 14px; font-weight: 700; color: #111; margin-bottom: 2px; }
    .modal-cat { font-size: 12px; color: #999; margin-bottom: 10px; }
    .modal-btn { width: 100%; padding: 10px; border-radius: 8px; background: #E8383A; color: #fff; border: none; font-size: 13px; font-weight: 700; cursor: pointer; }

    /* Loading */
    .loading { grid-column: 1/-1; text-align: center; padding: 40px; color: #bbb; font-size: 13px; }

    @media (max-width: 768px) {
      .sidebar { width: 100%; height: 56px; top: auto; bottom: 0; left: 0; border-right: none; border-top: 1px solid #f0f0f0; flex-direction: row; padding: 6px 12px 10px; align-items: center; }
      .logo, .divider, .cta-bloc, .side-bottom, #side-auth, #side-user-box { display: none !important; }
      .nav-item { flex-direction: column; gap: 1px; padding: 4px 6px; font-size: 9px; flex: 1; justify-content: center; background: transparent !important; }
      .main { margin-left: 0; padding-bottom: 60px; }
      .grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<div class="sidebar">

  <a href="/" class="logo">Show<span>One</span></a>

  <nav class="side-nav">
    <a href="/" class="nav-item active">🏠 Accueil</a>
    <a href="/castings" class="nav-item">🎬 Castings</a>
    <a href="/messagerie" class="nav-item">💬 Messages</a>
    <div class="nav-divider"></div>
    <a href="/inscription" class="nav-item">🎤 Talents — Inscrivez-vous</a>
    <a href="/inscription?type=recruteur" class="nav-item nav-red">🎬 Recruteurs — Votre agence</a>
    <div class="nav-divider"></div>
    <a href="/qui-sommes-nous" class="nav-item nav-small">Qui sommes-nous</a>
    <a href="/contact" class="nav-item nav-small">Nous contacter</a>
    <a href="/legal" class="nav-item nav-small">CGU</a>
    <a href="#" class="nav-item" id="navDashboard" style="display:none">👤 Mon espace</a>
    <a href="#" class="nav-item nav-red" onclick="seDeconnecter()" id="navDeco" style="display:none">🚪 Déconnexion</a>
  </nav>

  <div class="side-bottom">
    <div id="side-auth">
      <button class="btn-join" onclick="location.href='/inscription'">S'inscrire gratuitement</button>
      <button class="btn-conn" onclick="location.href='/connexion'">Connexion</button>
    </div>
    <div id="side-user-box" style="display:none">
      <div class="side-user">
        <div class="side-av" id="sideAv">?</div>
        <div>
          <div class="side-nom" id="sideNom">—</div>
          <div class="side-role" id="sideRole">—</div>
        </div>
      </div>
    </div>
    <span class="side-copy">© 2025 ShowOne</span>
  </div>

</div>

<div class="main">
  <div class="cats" id="catsTalents">
    <div class="chip active" onclick="filtrerCat(this,'')">Tous</div>
    <div class="chip" onclick="filtrerCat(this,'acting')">🎬 Acting</div>
    <div class="chip" onclick="filtrerCat(this,'musique')">🎤 Musique</div>
    <div class="chip" onclick="filtrerCat(this,'danse')">💃 Danse</div>
    <div class="chip" onclick="filtrerCat(this,'sport')">⚽ Sport</div>
    <div class="chip" onclick="filtrerCat(this,'mode')">👗 Mode</div>
    <div class="chip" onclick="filtrerCat(this,'art')">🎨 Art</div>
    <div class="chip" onclick="filtrerCat(this,'animaux')">🐾 Animaux</div>
  </div>

  <div class="sec-head">
    <div class="sec-title">Talents</div>
    <div class="sec-count" id="cntTalents"></div>
  </div>
  <div class="grid" id="gridTalents">
    <div class="loading">Chargement…</div>
  </div>

  <div class="sec-sep"></div>

  <div class="sec-head">
    <div class="sec-title">Castings recruteurs</div>
    <div class="sec-count" id="cntCastings"></div>
  </div>
  <div class="grid" id="gridCastings" style="padding-bottom:32px;">
    <div class="loading">Chargement…</div>
  </div>
</div>

<div class="modal-ov" id="modal" onclick="fermerModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="fermerModal()">✕</button>
    <div class="modal-vid"><video id="modalVid" controls playsinline></video></div>
    <div class="modal-info">
      <div class="modal-name" id="modalName"></div>
      <div class="modal-cat" id="modalCat"></div>
      <button class="modal-btn" id="modalBtn">✉ Contacter</button>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://emiuzigtlomlrsofxqyf.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtaXV6aWd0bG9tbHJzb2Z4cXlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDI4NTcsImV4cCI6MjA5MzQ3ODg1N30.Cwe-Z1vNGc-puz8jEnHdMMCwllNbl9fRAdwLe5zWyIY';
const sb = supabase.createClient(SB_URL, SB_KEY);
let allTalents = [], _hls = null;

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    document.getElementById('side-auth').style.display = 'none';
    document.getElementById('side-user-box').style.display = 'block';
    const u = JSON.parse(localStorage.getItem('showone_user') || '{}');
    const prenom = u.prenom || session.user.email.split('@')[0];
    const type = u.type_compte || 'talent';
    document.getElementById('sideAv').textContent = prenom[0]?.toUpperCase() || '?';
    document.getElementById('sideNom').textContent = prenom;
    document.getElementById('sideRole').textContent = type === 'recruteur' ? 'Recruteur' : 'Talent';
    document.getElementById('navDashboard').style.display = 'flex';
    document.getElementById('navDashboard').href = type === 'recruteur' ? '/dashboard-recruteur' : '/dashboard-talent';
    document.getElementById('navDeco').style.display = 'flex';
  }
  chargerTalents();
  chargerCastings();
}

async function chargerTalents() {
  const { data } = await sb.from('videos')
    .select('id,playback_id,vues,profils_talents!inner(id,nom_scene,categorie,sous_categorie,utilisateurs(prenom,nom,ville))')
    .eq('statut','en_ligne').not('playback_id','is',null)
    .order('vues',{ascending:false}).limit(60);
  allTalents = data || [];
  afficherTalents(allTalents);
}

function filtrerCat(el, cat) {
  document.querySelectorAll('#catsTalents .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  afficherTalents(cat ? allTalents.filter(v => (v.profils_talents?.categorie||'').toLowerCase().includes(cat)) : allTalents);
}

function afficherTalents(liste) {
  const g = document.getElementById('gridTalents');
  document.getElementById('cntTalents').textContent = liste.length + ' talent' + (liste.length>1?'s':'');
  if (!liste.length) { g.innerHTML = '<div class="loading">Aucun talent.</div>'; return; }
  g.innerHTML = liste.map(v => {
    const p = v.profils_talents, u = p?.utilisateurs;
    const nom = p?.nom_scene || ((u?.prenom||'')+' '+(u?.nom||'')).trim();
    const cat = p?.sous_categorie || p?.categorie || '';
    const thumb = v.playback_id ? `https://image.mux.com/${v.playback_id}/thumbnail.jpg?width=300&height=400&fit_mode=crop` : '';
    return `<div class="tcard" onclick="ouvrirVideo('${v.playback_id}','${nom.replace(/'/g,"\\'")}','${cat}','${p?.id}')">
      ${thumb ? `<img src="${thumb}" alt="${nom}" loading="lazy">` : `<div class="tcard-bg">${nom.substring(0,2).toUpperCase()}</div>`}
      <div class="tcard-overlay"></div>
      <div class="tcard-views">👁 ${(v.vues||0).toLocaleString('fr-FR')}</div>
      <div class="tcard-play">▶</div>
      <div class="tcard-info">
        <div class="tcard-name">${nom}</div>
        <div class="tcard-cat">${cat}</div>
        <button class="tcard-btn" onclick="event.stopPropagation();contacter('${p?.id}')">Contacter</button>
      </div>
    </div>`;
  }).join('');
}

async function chargerCastings() {
  const { data } = await sb.from('castings')
    .select('id,titre,categorie,ville,video_playback_id,recruteur_id')
    .eq('statut','actif').not('video_playback_id','is',null)
    .order('created_at',{ascending:false}).limit(20);
  const castings = data || [];
  for (const c of castings) {
    try { const {data:r} = await sb.from('profils_recruteurs').select('nom_societe').eq('id',c.recruteur_id).single(); c.rec_nom = r?.nom_societe||'Recruteur'; } catch(e) { c.rec_nom='Recruteur'; }
  }
  const g = document.getElementById('gridCastings');
  document.getElementById('cntCastings').textContent = castings.length + ' casting' + (castings.length>1?'s':'');
  if (!castings.length) { g.innerHTML = '<div class="loading">Aucun casting vidéo.</div>'; return; }
  g.innerHTML = castings.map(c => {
    const thumb = `https://image.mux.com/${c.video_playback_id}/thumbnail.jpg?width=300&height=400&fit_mode=crop`;
    return `<div class="tcard" onclick="ouvrirCasting('${c.video_playback_id}','${(c.rec_nom||'').replace(/'/g,"\\'")}','${c.categorie||''}','${c.id}','${(c.titre||'').replace(/'/g,"\\'")}')">
      <img src="${thumb}" alt="${c.titre}" loading="lazy">
      <div class="tcard-overlay"></div>
      <div class="tcard-play">▶</div>
      <div class="tcard-info">
        <div class="tcard-name">${c.titre||'Casting'}</div>
        <div class="tcard-cat">${c.rec_nom}${c.ville?' · '+c.ville:''}</div>
        <button class="tcard-btn" style="background:#111;" onclick="event.stopPropagation();location.href='/castings'">Postuler →</button>
      </div>
    </div>`;
  }).join('');
}

function ouvrirVideo(pid, nom, cat, talentId) {
  if (!pid) return;
  jouer(pid);
  document.getElementById('modalName').textContent = nom;
  document.getElementById('modalCat').textContent = cat;
  document.getElementById('modalBtn').textContent = '✉ Contacter ce talent';
  document.getElementById('modalBtn').onclick = () => { fermerModal(); contacter(talentId); };
  document.getElementById('modal').classList.add('open');
}

function ouvrirCasting(pid, rec, cat, id, titre) {
  if (!pid) return;
  jouer(pid);
  document.getElementById('modalName').textContent = titre;
  document.getElementById('modalCat').textContent = 'Par '+rec+(cat?' · '+cat:'');
  document.getElementById('modalBtn').textContent = '→ Postuler';
  document.getElementById('modalBtn').onclick = () => { fermerModal(); location.href='/castings'; };
  document.getElementById('modal').classList.add('open');
}

function jouer(pid) {
  const vid = document.getElementById('modalVid');
  const src = `https://stream.mux.com/${pid}.m3u8`;
  if (_hls) { _hls.destroy(); _hls = null; }
  if (Hls.isSupported()) { _hls = new Hls(); _hls.loadSource(src); _hls.attachMedia(vid); _hls.on(Hls.Events.MANIFEST_PARSED,()=>vid.play()); }
  else if (vid.canPlayType('application/vnd.apple.mpegurl')) { vid.src=src; vid.play(); }
}

function fermerModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  const vid = document.getElementById('modalVid'); vid.pause(); vid.src='';
  if (_hls) { _hls.destroy(); _hls=null; }
}

function contacter(talentId) {
  const u = JSON.parse(localStorage.getItem('showone_user')||'{}');
  if (!u.id) { location.href='/connexion'; return; }
  if (u.type_compte !== 'recruteur') { alert('Seuls les recruteurs peuvent contacter les talents.'); return; }
  location.href = `/messagerie?talent_id=${talentId}`;
}

function seDeconnecter() {
  localStorage.removeItem('showone_token');
  localStorage.removeItem('showone_user');
  location.reload();
}

init();
</script>
</body>
</html>
