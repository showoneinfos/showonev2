<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié — ShowOne</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #fff; color: #111; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 40px; border-bottom: 1px solid #f0f0f0; }
    .logo { font-size: 20px; font-weight: 900; color: #111; text-decoration: none; }
    .logo span { color: #E8383A; }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card { width: 100%; max-width: 400px; }
    h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.8px; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #999; margin-bottom: 28px; line-height: 1.6; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid #e8e8e8; border-radius: 9px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; color: #111; }
    .form-input:focus { border-color: #111; }
    .btn { width: 100%; padding: 14px; border-radius: 10px; background: #111; color: #fff; border: none; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 12px; }
    .btn:disabled { background: #ccc; }
    .success { display: none; background: #e8f8f0; border: 1px solid #b0e8cc; border-radius: 9px; padding: 14px; color: #0a7a56; font-weight: 600; font-size: 14px; margin-top: 16px; }
    .error { display: none; background: #fff0f0; border: 1px solid #ffd0d0; border-radius: 9px; padding: 12px; color: #cc2e30; font-size: 13px; margin-bottom: 12px; }
    .back { display: block; text-align: center; margin-top: 16px; font-size: 13px; color: #999; text-decoration: none; }
    .back:hover { color: #111; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Show<span>One</span></a>
</nav>
<div class="main">
  <div class="card">
    <h1>Mot de passe oublié</h1>
    <p class="sub">Entrez votre email et nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>
    <div class="error" id="errMsg"></div>
    <label class="form-label">Email</label>
    <input class="form-input" type="email" id="emailInput" placeholder="votre@email.com">
    <button class="btn" id="btnSend" onclick="envoyer()">Envoyer le lien</button>
    <div class="success" id="successMsg">✅ Email envoyé ! Vérifiez votre boîte mail (et vos spams).</div>
    <a href="/connexion" class="back">← Retour à la connexion</a>
  </div>
</div>
<script>
const SUPABASE_URL = 'https://emiuzigtlomlrsofxqyf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtaXV6aWd0bG9tbHJzb2Z4cXlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDI4NTcsImV4cCI6MjA5MzQ3ODg1N30.Cwe-Z1vNGc-puz8jEnHdMMCwllNbl9fRAdwLe5zWyIY';

async function envoyer() {
  const email = document.getElementById('emailInput').value.trim();
  const errDiv = document.getElementById('errMsg');
  errDiv.style.display = 'none';
  if (!email) { errDiv.innerHTML = 'Merci de renseigner votre email.'; errDiv.style.display='block'; return; }
  const btn = document.getElementById('btnSend'); btn.disabled=true; btn.textContent='Envoi…';
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email, redirectTo: 'https://showonev2.vercel.app/connexion' })
    });
    document.getElementById('successMsg').style.display = 'block';
    btn.style.display = 'none';
  } catch(e) { errDiv.innerHTML = 'Une erreur est survenue. Réessayez.'; errDiv.style.display='block'; btn.disabled=false; btn.textContent='Envoyer le lien'; }
}
</script>
</body>
</html>
