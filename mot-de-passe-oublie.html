<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mot de passe oublié – ShowOne</title>
  <link rel="icon" href="assets/favicon.png" type="image/png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      color: #D4AF37;
      text-decoration: none;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 10px;
      color: #fff;
    }
    p.subtitle {
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #ccc;
      margin-bottom: 6px;
    }
    input[type="email"] {
      width: 100%;
      background: #111;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="email"]:focus { border-color: #D4AF37; }
    .btn {
      width: 100%;
      margin-top: 20px;
      background: #D4AF37;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      background: rgba(255,80,80,0.1);
      border: 1px solid rgba(255,80,80,0.3);
      border-radius: 8px;
      padding: 12px;
      color: #ff6b6b;
      font-size: 0.85rem;
      margin-top: 16px;
      display: none;
    }
    .success {
      background: rgba(80,200,120,0.1);
      border: 1px solid rgba(80,200,120,0.3);
      border-radius: 8px;
      padding: 16px;
      color: #4ecb71;
      font-size: 0.9rem;
      margin-top: 16px;
      display: none;
      line-height: 1.5;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: #D4AF37;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <a href="index.html" class="logo">SHOW<span style="color:#fff">ONE</span></a>

  <div class="card">
    <h1>Mot de passe oublié ?</h1>
    <p class="subtitle">Saisis ton adresse email et nous t'enverrons un lien pour réinitialiser ton mot de passe.</p>

    <div id="formSection">
      <label for="email">Adresse email</label>
      <input type="email" id="email" placeholder="ton@email.com" autocomplete="email" />

      <div class="error" id="errorMsg"></div>

      <button class="btn" id="btnSend" onclick="sendReset()">Envoyer le lien</button>
    </div>

    <div class="success" id="successMsg">
      ✅ Un lien de réinitialisation a été envoyé à ton adresse email.<br><br>
      Pense à vérifier tes spams si tu ne le reçois pas dans quelques minutes.
    </div>

    <a href="connexion.html" class="back-link">← Retour à la connexion</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://emiuzigtlomlrsofxqyf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtaXV6aWd0bG9tbHJzb2Z4cXlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDYyMDk2NDQsImV4cCI6MjA2MTc4NTY0NH0.bwbRqOmRgoPe2IIi5vBp1yy6OdFeBSr1DaqVWlrEfKM';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function sendReset() {
      const email = document.getElementById('email').value.trim();
      const errorDiv = document.getElementById('errorMsg');
      const btn = document.getElementById('btnSend');

      errorDiv.style.display = 'none';

      if (!email) {
        errorDiv.textContent = 'Merci de saisir ton adresse email.';
        errorDiv.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Envoi en cours...';

      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://www.showone.fr/reset-password'
      });

      if (error) {
        errorDiv.textContent = 'Une erreur est survenue. Vérifie ton adresse email et réessaie.';
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Envoyer le lien';
        return;
      }

      document.getElementById('formSection').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    }

    // Appui sur Entrée
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendReset();
    });
  </script>

</body>
</html>
