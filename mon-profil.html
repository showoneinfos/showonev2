<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon profil — ShowOne</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f8f8f8; color: #111; min-height: 100vh; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 40px; background: #fff; border-bottom: 1px solid #f0f0f0; }
    .logo { font-size: 20px; font-weight: 900; color: #111; text-decoration: none; }
    .logo span { color: #E8383A; }
    .btn-back { font-size: 13px; color: #999; text-decoration: none; }
    .btn-back:hover { color: #111; }

    .main { max-width: 600px; margin: 0 auto; padding: 40px 20px 80px; }
    h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.8px; margin-bottom: 6px; }
    .sub { font-size: 14px; color: #999; margin-bottom: 32px; }

    /* SECTIONS */
    .section { background: #fff; border-radius: 12px; border: 1px solid #f0f0f0; padding: 24px; margin-bottom: 16px; }
    .section-title { font-size: 13px; font-weight: 700; color: #111; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; }

    /* PHOTO */
    .photo-wrap { display: flex; align-items: center; gap: 20px; margin-bottom: 4px; }
    .photo-av { width: 72px; height: 72px; border-radius: 50%; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; flex-shrink: 0; overflow: hidden; }
    .photo-av img { width: 100%; height: 100%; object-fit: cover; }
    .btn-photo { padding: 8px 16px; border-radius: 8px; border: 1px solid #e8e8e8; background: #fff; font-size: 12px; font-weight: 600; cursor: pointer; }
    input[type="file"] { display: none; }

    /* FORM */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-input { width: 100%; padding: 11px 14px; border: 1.5px solid #e8e8e8; border-radius: 9px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; color: #111; background: #fff; }
    .form-input:focus { border-color: #111; }
    .form-input::placeholder { color: #ccc; }
    textarea.form-input { resize: vertical; min-height: 90px; }
    select.form-input { cursor: pointer; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* BOUTONS */
    .btn-save { width: 100%; padding: 13px; border-radius: 10px; background: #111; color: #fff; border: none; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 4px; }
    .btn-save:disabled { background: #ccc; cursor: not-allowed; }
    .btn-danger { width: 100%; padding: 11px; border-radius: 10px; background: #fff; color: #E8383A; border: 1.5px solid #E8383A; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 8px; }

    /* ALERTS */
    .alert-success { display: none; background: #e8f8f0; border: 1px solid #b0e8cc; border-radius: 8px; padding: 11px 14px; color: #0a7a56; font-size: 13px; font-weight: 600; margin-bottom: 14px; }
    .alert-error { display: none; background: #fff0f0; border: 1px solid #ffd0d0; border-radius: 8px; padding: 11px 14px; color: #cc2e30; font-size: 13px; margin-bottom: 14px; }

    @media (max-width: 600px) {
      nav { padding: 14px 20px; }
      .form-row { grid-template-columns: 1fr; }
      body { padding-bottom: 70px; }
    }

    /* MOBILE BAR */
    .mobile-bar { display: none; }
    @media (max-width: 768px) {
      .mobile-bar {
        display: flex; position: fixed; bottom: 0; left: 0; right: 0;
        background: #fff; border-top: 1px solid #f0f0f0;
        padding: 8px 4px 14px; z-index: 1000; align-items: center;
      }
      .mobile-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none; color: #aaa; font-size: 10px; font-weight: 600; }
      .mobile-btn span { font-size: 10px; display: block; }
      .mobile-btn.active { color: #111; }
      .mobile-join { flex: none; margin: 0 8px; background: #111; color: #fff !important; padding: 8px 14px; border-radius: 8px; font-size: 12px !important; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 1px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">Show<span>One</span></a>
  <a href="#" class="btn-back" id="backBtn">← Mon espace</a>
</nav>

<div class="main">
  <h1>Mon profil</h1>
  <p class="sub" id="subTitle">Modifiez vos informations personnelles.</p>

  <div class="alert-success" id="alertSuccess">✅ Profil mis à jour avec succès !</div>
  <div class="alert-error" id="alertError"></div>

  <!-- PHOTO -->
  <div class="section">
    <div class="section-title">Photo de profil</div>
    <div class="photo-wrap">
      <div class="photo-av" id="photoAv">?</div>
      <div>
        <button class="btn-photo" onclick="document.getElementById('photoInput').click()">Changer la photo</button>
        <input type="file" id="photoInput" accept="image/*" onchange="changerPhoto(this)">
        <p style="font-size:11px;color:#bbb;margin-top:6px;">JPG, PNG · max 5MB</p>
      </div>
    </div>
  </div>

  <!-- INFOS COMMUNES -->
  <div class="section">
    <div class="section-title">Informations personnelles</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Prénom *</label>
        <input class="form-input" type="text" id="prenom" placeholder="Marie">
      </div>
      <div class="form-group">
        <label class="form-label">Nom *</label>
        <input class="form-input" type="text" id="nom" placeholder="Dupont">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Ville</label>
      <input class="form-input" type="text" id="ville" placeholder="Paris, Lyon, Marseille…">
    </div>
  </div>

  <!-- SECTION TALENT -->
  <div class="section" id="sectionTalent" style="display:none">
    <div class="section-title">Profil talent</div>
    <div class="form-group">
      <label class="form-label">Nom de scène</label>
      <input class="form-input" type="text" id="nomScene" placeholder="Ton nom artistique">
    </div>
    <div class="form-group">
      <label class="form-label">Catégorie</label>
      <select class="form-input" id="categorie">
        <option value="">-- Choisir --</option>
        <option value="acting">🎬 Acting / Cinéma & TV</option>
        <option value="musique">🎤 Musique / Chant</option>
        <option value="danse">💃 Danse</option>
        <option value="sport">⚽ Sport</option>
        <option value="createurs">📱 Créateurs de contenu</option>
        <option value="mode">👗 Mode / Mannequinat</option>
        <option value="art">🎨 Art & Création</option>
        <option value="animaux">🐾 Animaux</option>
        <option value="talents">✨ Talents variés</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Bio</label>
      <textarea class="form-input" id="bio" placeholder="Présente-toi en quelques mots…"></textarea>
    </div>
  </div>

  <!-- SECTION RECRUTEUR -->
  <div class="section" id="sectionRecruteur" style="display:none">
    <div class="section-title">Profil recruteur</div>
    <div class="form-group">
      <label class="form-label">Nom de la société *</label>
      <input class="form-input" type="text" id="nomSociete" placeholder="Nom de votre agence ou société">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="descriptionRec" placeholder="Présentez votre agence, vos activités…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Site web</label>
      <input class="form-input" type="url" id="siteWeb" placeholder="https://votre-site.fr">
    </div>
  </div>

  <!-- EMAIL & MOT DE PASSE -->
  <div class="section">
    <div class="section-title">Compte</div>
    <div class="form-group">
      <label class="form-label">Adresse email</label>
      <input class="form-input" type="email" id="email" placeholder="votre@email.com">
    </div>
    <button class="btn-save" style="background:#555;margin-bottom:8px;" onclick="changerEmail()">Changer l'email</button>
    <div class="form-group" style="margin-top:14px;">
      <label class="form-label">Nouveau mot de passe</label>
      <input class="form-input" type="password" id="newPassword" placeholder="Laisser vide pour ne pas changer">
    </div>
    <button class="btn-save" style="background:#555;" onclick="changerMotDePasse()">Changer le mot de passe</button>
  </div>

  <button class="btn-save" id="btnSave" onclick="sauvegarder()">💾 Sauvegarder le profil</button>
  <button class="btn-danger" onclick="if(confirm('Voulez-vous vraiment supprimer votre compte ?')) supprimerCompte()">Supprimer mon compte</button>
</div>

<!-- BARRE MOBILE -->
<div class="mobile-bar" id="mobileBar">
  <a href="/" class="mobile-btn" id="mb-home">🏠<span>Accueil</span></a>
  <a href="/castings" class="mobile-btn" id="mb-castings">🎬<span>Castings</span></a>
  <a href="/messagerie" class="mobile-btn" id="mb-msg">💬<span>Messages</span></a>
  <a href="#" class="mobile-btn mobile-join" id="mb-auth">👤<span>Mon espace</span></a>
</div>

<script>
const SB_URL = 'https://emiuzigtlomlrsofxqyf.supabase.co';
const SB_KEY = 'sb_publishable_U8P52zBkzF6Nqno_mmbcVQ_bKQLNmTP';

const token = localStorage.getItem('showone_token');
const userStr = localStorage.getItem('showone_user');
if (!token || !userStr) { window.location.href = '/connexion'; }
const user = JSON.parse(userStr || '{}');
const isRecruteur = user.type_compte === 'recruteur';

// Setup
document.getElementById('backBtn').href = isRecruteur ? '/dashboard-recruteur' : '/dashboard-talent';
document.getElementById('mb-auth').href = isRecruteur ? '/dashboard-recruteur' : '/dashboard-talent';
document.getElementById('sectionTalent').style.display = isRecruteur ? 'none' : 'block';
document.getElementById('sectionRecruteur').style.display = isRecruteur ? 'block' : 'none';

async function chargerProfil() {
  // Infos utilisateur
  const res = await fetch(`${SB_URL}/rest/v1/utilisateurs?id=eq.${user.id}&select=*`, {
    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}` }
  });
  const data = await res.json();
  const u = data[0];
  if (!u) return;

  document.getElementById('prenom').value = u.prenom || '';
  document.getElementById('nom').value = u.nom || '';
  document.getElementById('ville').value = u.ville || '';
  document.getElementById('email').value = u.email || '';

  // Avatar
  const av = document.getElementById('photoAv');
  if (u.photo_url) {
    av.innerHTML = `<img src="${u.photo_url}" alt="photo">`;
  } else {
    av.textContent = (u.prenom || '?')[0].toUpperCase();
  }

  if (isRecruteur) {
    const recRes = await fetch(`${SB_URL}/rest/v1/profils_recruteurs?utilisateur_id=eq.${user.id}&select=*`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}` }
    });
    const recData = await recRes.json();
    const rec = recData[0];
    if (rec) {
      document.getElementById('nomSociete').value = rec.nom_societe || '';
      document.getElementById('descriptionRec').value = rec.description || '';
      document.getElementById('siteWeb').value = rec.site_web || '';
    }
  } else {
    const talRes = await fetch(`${SB_URL}/rest/v1/profils_talents?utilisateur_id=eq.${user.id}&select=*`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}` }
    });
    const talData = await talRes.json();
    const tal = talData[0];
    if (tal) {
      document.getElementById('nomScene').value = tal.nom_scene || '';
      document.getElementById('categorie').value = tal.categorie || '';
      document.getElementById('bio').value = tal.bio || '';
    }
  }
}

async function changerPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('photoAv').innerHTML = `<img src="${e.target.result}" alt="photo">`;
  };
  reader.readAsDataURL(file);

  // Upload vers Supabase Storage
  try {
    const ext = file.name.split('.').pop();
    const path = `avatars/${user.id}.${ext}`;
    const uploadRes = await fetch(`${SB_URL}/storage/v1/object/public/${path}`, {
      method: 'PUT',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': file.type },
      body: file
    });
    if (uploadRes.ok) {
      const photoUrl = `${SB_URL}/storage/v1/object/public/${path}`;
      await fetch(`${SB_URL}/rest/v1/utilisateurs?id=eq.${user.id}`, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ photo_url: photoUrl })
      });
      const u = JSON.parse(localStorage.getItem('showone_user') || '{}');
      u.photo_url = photoUrl;
      localStorage.setItem('showone_user', JSON.stringify(u));
    }
  } catch(e) { console.log('Photo:', e); }
}

async function sauvegarder() {
  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = 'Sauvegarde…';
  document.getElementById('alertSuccess').style.display = 'none';
  document.getElementById('alertError').style.display = 'none';

  try {
    const prenom = document.getElementById('prenom').value.trim();
    const nom = document.getElementById('nom').value.trim();
    const ville = document.getElementById('ville').value.trim();

    if (!prenom || !nom) {
      document.getElementById('alertError').textContent = '⚠️ Prénom et nom obligatoires.';
      document.getElementById('alertError').style.display = 'block';
      btn.disabled = false; btn.textContent = '💾 Sauvegarder le profil';
      return;
    }

    // Mettre à jour utilisateurs
    await fetch(`${SB_URL}/rest/v1/utilisateurs?id=eq.${user.id}`, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ prenom, nom, ville })
    });

    // Mettre à jour localStorage
    const u = JSON.parse(localStorage.getItem('showone_user') || '{}');
    u.prenom = prenom; u.nom = nom;
    localStorage.setItem('showone_user', JSON.stringify(u));

    if (isRecruteur) {
      const nomSociete = document.getElementById('nomSociete').value.trim();
      const description = document.getElementById('descriptionRec').value.trim();
      const siteWeb = document.getElementById('siteWeb').value.trim();
      await fetch(`${SB_URL}/rest/v1/profils_recruteurs?utilisateur_id=eq.${user.id}`, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ nom_societe: nomSociete || prenom + ' ' + nom, description, site_web: siteWeb })
      });
    } else {
      const nomScene = document.getElementById('nomScene').value.trim();
      const categorie = document.getElementById('categorie').value;
      const bio = document.getElementById('bio').value.trim();
      await fetch(`${SB_URL}/rest/v1/profils_talents?utilisateur_id=eq.${user.id}`, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ nom_scene: nomScene || prenom, categorie, bio })
      });
    }

    document.getElementById('alertSuccess').style.display = 'block';
    window.scrollTo(0, 0);
  } catch(e) {
    document.getElementById('alertError').textContent = '⚠️ Erreur lors de la sauvegarde.';
    document.getElementById('alertError').style.display = 'block';
  }
  btn.disabled = false; btn.textContent = '💾 Sauvegarder le profil';
}

async function changerEmail() {
  const newEmail = document.getElementById('email').value.trim();
  if (!newEmail) return;
  try {
    const res = await fetch(`${SB_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: newEmail })
    });
    if (res.ok) {
      await fetch(`${SB_URL}/rest/v1/utilisateurs?id=eq.${user.id}`, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ email: newEmail })
      });
      alert('✅ Email mis à jour !');
    } else { alert('Erreur lors du changement d\'email.'); }
  } catch(e) { alert('Erreur.'); }
}

async function changerMotDePasse() {
  const newPwd = document.getElementById('newPassword').value;
  if (!newPwd || newPwd.length < 8) { alert('Le mot de passe doit faire au moins 8 caractères.'); return; }
  try {
    const res = await fetch(`${SB_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: newPwd })
    });
    if (res.ok) { alert('✅ Mot de passe changé !'); document.getElementById('newPassword').value = ''; }
    else { alert('Erreur lors du changement de mot de passe.'); }
  } catch(e) { alert('Erreur.'); }
}

async function supprimerCompte() {
  localStorage.removeItem('showone_token');
  localStorage.removeItem('showone_user');
  window.location.href = '/';
}

chargerProfil();
</script>
</body>
</html>
