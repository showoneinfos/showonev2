<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Profil Talent — ShowOne</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', sans-serif; background: #f8f8f8; color: #111; padding-bottom: 80px; }

    /* NAV */
    .top-nav {
      position: sticky; top: 0; z-index: 100;
      background: #fff; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
    }
    .top-logo { font-size: 20px; font-weight: 900; color: #111; text-decoration: none; }
    .top-logo span { color: #E8383A; }
    .btn-back { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: #111; text-decoration: none; background: none; border: none; cursor: pointer; }

    /* HERO VIDÉO */
    .hero-video {
      position: relative; width: 100%;
      background: #000; aspect-ratio: 9/16;
      max-height: 70vh; overflow: hidden;
      cursor: pointer;
    }
    .hero-video video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hero-video-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
    }
    .hero-play {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 60px; height: 60px; border-radius: 50%;
      background: rgba(232,56,58,0.9);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: #fff;
      transition: opacity 0.2s;
    }
    .hero-play.hidden { opacity: 0; pointer-events: none; }
    .hero-tap-hint {
      position: absolute; top: 14px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff; font-size: 12px; font-weight: 700;
      padding: 6px 16px; border-radius: 100px;
      white-space: nowrap; pointer-events: none;
      display: none;
    }
    .hero-tap-hint.visible { display: block; }

    /* PROFIL CARD */
    .profil-card {
      background: #fff; margin: 0;
      padding: 20px 16px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .profil-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .profil-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: #111; display: flex; align-items: center;
      justify-content: center; color: #fff; font-size: 22px;
      font-weight: 900; flex-shrink: 0; overflow: hidden;
    }
    .profil-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profil-nom { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 4px; }
    .profil-cat {
      display: inline-block; padding: 3px 10px;
      border-radius: 100px; background: #f0f0f0;
      font-size: 11px; font-weight: 700; color: #555;
      margin-bottom: 4px;
    }
    .profil-ville { font-size: 13px; color: #999; }

    .profil-stats { display: flex; gap: 20px; margin-bottom: 14px; }
    .stat { text-align: center; }
    .stat-num { font-size: 18px; font-weight: 900; color: #111; }
    .stat-lbl { font-size: 11px; color: #bbb; margin-top: 1px; }

    .profil-bio { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 16px; }

    /* Bouton Contacter */
    .btn-contacter {
      display: block; width: 100%; padding: 14px;
      border-radius: 10px; background: #E8383A; color: #fff;
      border: none; font-size: 15px; font-weight: 700;
      cursor: pointer; text-align: center; letter-spacing: 0.2px;
    }
    .btn-contacter-locked {
      display: block; width: 100%; padding: 14px;
      border-radius: 10px; background: #f0f0f0; color: #999;
      border: none; font-size: 15px; font-weight: 700;
      cursor: pointer; text-align: center;
    }
    .btn-partager {
      display: block; width: 100%; padding: 12px;
      border-radius: 10px; background: transparent;
      border: 1.5px solid #e0e0e0; color: #111;
      font-size: 14px; font-weight: 700; cursor: pointer;
      text-align: center; margin-top: 8px;
      text-decoration: none;
    }

    /* Autres vidéos */
    .section { padding: 16px; }
    .section-title { font-size: 14px; font-weight: 900; color: #111; margin-bottom: 12px; letter-spacing: -0.3px; }
    .videos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
    .vcard { position: relative; aspect-ratio: 3/4; overflow: hidden; cursor: pointer; background: #f0f0f0; border-radius: 4px; }
    .vcard img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .vcard-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.15); }
    .vcard-views { position: absolute; bottom: 5px; left: 6px; font-size: 10px; font-weight: 700; color: #fff; background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 100px; }
    .vcard-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 20px; color: #fff; opacity: 0.8; }

    /* Modal vidéo */
    .modal-vid-ov { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
    .modal-vid-ov.open { display: block; }
    .modal-vid-close { position: absolute; top: 14px; right: 14px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2); border: none; color: #fff; font-size: 18px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; }
    .modal-vid-el { width: 100%; height: 100%; object-fit: contain; display: block; }

    /* Popup upgrade */
    .upgrade-ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; align-items: flex-end; justify-content: center; padding: 0; }
    .upgrade-ov.open { display: flex; }
    .upgrade-box { background: #fff; border-radius: 20px 20px 0 0; padding: 28px 20px 36px; width: 100%; max-width: 500px; }
    .upgrade-ico { font-size: 36px; text-align: center; margin-bottom: 12px; }
    .upgrade-title { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 8px; text-align: center; }
    .upgrade-sub { font-size: 13px; color: #999; line-height: 1.6; margin-bottom: 18px; text-align: center; }
    .upgrade-features { list-style: none; background: #f8f8f8; border-radius: 10px; padding: 14px 16px; margin-bottom: 18px; display: flex; flex-direction: column; gap: 7px; font-size: 13px; color: #555; }
    .btn-upgrade { display: block; width: 100%; padding: 15px; border-radius: 10px; border: none; background: #E8383A; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; margin-bottom: 10px; }
    .btn-close-up { display: block; width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid #e0e0e0; background: transparent; font-size: 14px; font-weight: 600; color: #999; cursor: pointer; text-align: center; }

    /* Barre mobile */
    .mobile-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid #f0f0f0;
      padding: 8px 4px env(safe-area-inset-bottom, 12px);
      z-index: 200; display: flex; align-items: center;
      justify-content: space-around;
    }
    .mb-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; color: #bbb; font-size: 10px; font-weight: 600; }
    .mb-ico { font-size: 22px; line-height: 1; }
    .mb-lbl { font-size: 10px; }
    .mb-join { flex: none; margin: 0 8px; background: #E8383A; color: #fff !important; padding: 9px 18px; border-radius: 9px; font-size: 13px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none; }

    /* Desktop */
    @media (min-width: 769px) {
      body { max-width: 480px; margin: 0 auto; background: #fff; padding-bottom: 0; }
      .top-nav { border-radius: 0; }
      .hero-video { max-height: 60vh; aspect-ratio: 9/16; }
      .mobile-bar { max-width: 480px; left: 50%; transform: translateX(-50%); }
    }

    /* Loading */
    .loading-screen { display: flex; align-items: center; justify-content: center; height: 60vh; color: #bbb; font-size: 14px; }
  </style>
</head>
<body>

<!-- NAV -->
<div class="top-nav">
  <button class="btn-back" onclick="history.back()">← Retour</button>
  <a href="/" class="top-logo">Show<span>One</span></a>
  <div style="width:60px;"></div>
</div>

<!-- CONTENU (chargé dynamiquement) -->
<div id="pageContent">
  <div class="loading-screen">Chargement du profil…</div>
</div>

<!-- MODAL VIDÉO -->
<div class="modal-vid-ov" id="modalVid">
  <button class="modal-vid-close" onclick="fermerVid()">✕</button>
  <video id="vidEl" controls playsinline class="modal-vid-el"></video>
</div>

<!-- POPUP UPGRADE -->
<div class="upgrade-ov" id="upgradeOv" onclick="if(event.target===this)fermerUpgrade()">
  <div class="upgrade-box">
    <div class="upgrade-ico">🔒</div>
    <div class="upgrade-title">Passez Recruteur Pro</div>
    <div class="upgrade-sub">Pour contacter ce talent et accéder à tous les profils ShowOne, passez au plan Pro.</div>
    <ul class="upgrade-features">
      <li>✅ Contacter tous les talents</li>
      <li>✅ Lire toutes les candidatures</li>
      <li>✅ Messagerie illimitée</li>
      <li>✅ Castings illimités</li>
    </ul>
    <button class="btn-upgrade" onclick="location.href='/dashboard-recruteur'">🔍 Devenir Recruteur Pro — 19,99€/mois</button>
    <button class="btn-close-up" onclick="fermerUpgrade()">Plus tard</button>
  </div>
</div>

<!-- BARRE MOBILE -->
<div class="mobile-bar">
  <a href="/" class="mb-btn"><span class="mb-ico">🏠</span><span class="mb-lbl">Accueil</span></a>
  <a href="/castings" class="mb-btn"><span class="mb-ico">🎬</span><span class="mb-lbl">Castings</span></a>
  <a href="/messagerie" class="mb-btn"><span class="mb-ico">💬</span><span class="mb-lbl">Messages</span></a>
  <a href="/inscription" class="mb-join" id="mb-auth"><span class="mb-ico">✨</span><span class="mb-lbl">S'inscrire</span></a>
</div>

<script>
const SB_URL = 'https://emiuzigtlomlrsofxqyf.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtaXV6aWd0bG9tbHJzb2Z4cXlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDI4NTcsImV4cCI6MjA5MzQ3ODg1N30.Cwe-Z1vNGc-puz8jEnHdMMCwllNbl9fRAdwLe5zWyIY';
let _hls = null, _hlsModal = null;
let talentId = null;

const user = (() => { try { return JSON.parse(localStorage.getItem('showone_user')||'{}'); } catch(e) { return {}; } })();
const isPro = user.plan === 'pro';
const isRecruteur = user.type_compte === 'recruteur';

// Barre mobile
(function() {
  const btn = document.getElementById('mb-auth');
  if (user && user.id) {
    const dest = user.type_compte === 'recruteur' ? '/dashboard-recruteur' : '/dashboard-talent';
    btn.href = dest;
    btn.querySelector('.mb-lbl').textContent = 'Mon espace';
    btn.querySelector('.mb-ico').textContent = '👤';
    btn.style.background = '#111';
  }
})();

async function charger() {
  const params = new URLSearchParams(location.search);
  talentId = params.get('id');
  if (!talentId) { document.getElementById('pageContent').innerHTML = '<div class="loading-screen">Profil introuvable.</div>'; return; }

  try {
    // Charger profil talent
    const r1 = await fetch(`${SB_URL}/rest/v1/profils_talents?id=eq.${talentId}&select=*,utilisateurs(prenom,nom,ville,email)&limit=1`, { headers: { apikey: SB_KEY } });
    const data = await r1.json();
    if (!data || !data.length) { document.getElementById('pageContent').innerHTML = '<div class="loading-screen">Profil introuvable.</div>'; return; }
    const p = data[0];
    const u = p.utilisateurs;

    // Charger vidéos
    const r2 = await fetch(`${SB_URL}/rest/v1/videos?talent_id=eq.${talentId}&statut=eq.en_ligne&playback_id=not.is.null&order=vues.desc&select=*`, { headers: { apikey: SB_KEY } });
    const videos = await r2.json() || [];

    const nom = p.nom_scene || ((u?.prenom||'')+' '+(u?.nom||'')).trim() || 'Talent';
    const cat = p.sous_categorie || p.categorie || '';
    const ville = u?.ville || '';
    const bio = p.bio || '';
    const photo = p.photo_url || '';
    const initiales = nom.substring(0,2).toUpperCase();
    const totalVues = videos.reduce((s,v) => s + (v.vues||0), 0);
    const videoMain = videos[0];
    const autresVideos = videos.slice(1);

    // SEO meta
    document.title = `${nom} — Talent ShowOne`;

    const catLabels = {
      acting:'🎬 Acting / Cinéma', musique:'🎤 Musique / Chant', danse:'💃 Danse',
      sport:'⚽ Sport', createurs:'📱 Créateurs', mode:'👗 Mode / Mannequinat',
      art:'🎨 Art & Création', talents:'✨ Performances', animaux:'🐾 Animaux', pro:'🎙️ Animateur'
    };
    const catDisplay = cat ? (catLabels[cat] || cat) : '';

    document.getElementById('pageContent').innerHTML = `
      <!-- VIDÉO PRINCIPALE -->
      ${videoMain ? `
      <div class="hero-video" id="heroWrap" onclick="togglePlay()">
        <video id="heroVid" playsinline loop style="width:100%;height:100%;object-fit:cover;display:block;"></video>
        <div class="hero-video-overlay"></div>
        <div class="hero-play" id="heroPlay">▶</div>
        <div class="hero-tap-hint" id="heroHint">👆 Tapotez pour pause</div>
      </div>` : `
      <div style="background:#f0f0f0;aspect-ratio:3/4;max-height:60vh;display:flex;align-items:center;justify-content:center;font-size:48px;">🎭</div>`}

      <!-- PROFIL -->
      <div class="profil-card">
        <div class="profil-top">
          <div class="profil-avatar">
            ${photo ? `<img src="${photo}" alt="${nom}">` : initiales}
          </div>
          <div>
            <div class="profil-nom">${nom}</div>
            ${catDisplay ? `<div class="profil-cat">${catDisplay}</div>` : ''}
            ${ville ? `<div class="profil-ville">📍 ${ville}</div>` : ''}
          </div>
        </div>

        <div class="profil-stats">
          <div class="stat"><div class="stat-num">${videos.length}</div><div class="stat-lbl">Vidéos</div></div>
          <div class="stat"><div class="stat-num">${totalVues.toLocaleString('fr-FR')}</div><div class="stat-lbl">Vues</div></div>
          ${p.experience ? `<div class="stat"><div class="stat-num">${p.experience}</div><div class="stat-lbl">Exp.</div></div>` : ''}
        </div>

        ${bio ? `<div class="profil-bio">${bio}</div>` : ''}

        ${isRecruteur && isPro
          ? `<button class="btn-contacter" onclick="contacter()">✉ Contacter ce talent</button>`
          : isRecruteur
            ? `<button class="btn-contacter-locked" onclick="ouvrirUpgrade()">🔒 Contacter (Pro requis)</button>`
            : user.id
              ? `<button class="btn-contacter" onclick="alert('Seuls les recruteurs peuvent contacter les talents.')">✉ Contacter</button>`
              : `<a href="/inscription?type=recruteur" class="btn-contacter">✉ Contacter ce talent</a>`
        }

        <button class="btn-partager" onclick="partager('${nom}')">🔗 Partager ce profil</button>
      </div>

      <!-- AUTRES VIDÉOS -->
      ${autresVideos.length ? `
      <div class="section">
        <div class="section-title">Autres vidéos</div>
        <div class="videos-grid">
          ${autresVideos.map(v => `
            <div class="vcard" onclick="ouvrirVid('${v.playback_id}')">
              <img src="https://image.mux.com/${v.playback_id}/thumbnail.jpg?width=200&height=267&fit_mode=crop" loading="lazy" alt="Vidéo">
              <div class="vcard-overlay"></div>
              <div class="vcard-play">▶</div>
              <div class="vcard-views">👁 ${(v.vues||0).toLocaleString('fr-FR')}</div>
            </div>
          `).join('')}
        </div>
      </div>` : ''}
    `;

    // Lancer la vidéo principale en autoplay muet
    if (videoMain) jouerHero(videoMain.playback_id);

  } catch(e) {
    console.error(e);
    document.getElementById('pageContent').innerHTML = '<div class="loading-screen">Erreur de chargement.</div>';
  }
}

function jouerHero(pid) {
  const vid = document.getElementById('heroVid');
  if (!vid) return;
  const src = `https://stream.mux.com/${pid}.m3u8`;
  vid.muted = true; // autoplay muet
  if (_hls) { _hls.destroy(); _hls = null; }
  if (Hls.isSupported()) {
    _hls = new Hls(); _hls.loadSource(src); _hls.attachMedia(vid);
    _hls.on(Hls.Events.MANIFEST_PARSED, () => vid.play());
  } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
    vid.src = src; vid.play();
  }
  vid.addEventListener('play', () => {
    document.getElementById('heroPlay').classList.add('hidden');
    document.getElementById('heroHint').classList.add('visible');
  });
  vid.addEventListener('pause', () => {
    document.getElementById('heroPlay').classList.remove('hidden');
    document.getElementById('heroHint').classList.remove('visible');
  });
}

function togglePlay() {
  const vid = document.getElementById('heroVid');
  if (!vid) return;
  if (vid.paused) { vid.muted = false; vid.play(); }
  else vid.pause();
}

function ouvrirVid(pid) {
  const vid = document.getElementById('vidEl');
  const src = `https://stream.mux.com/${pid}.m3u8`;
  if (_hlsModal) { _hlsModal.destroy(); _hlsModal = null; }
  if (Hls.isSupported()) {
    _hlsModal = new Hls(); _hlsModal.loadSource(src); _hlsModal.attachMedia(vid);
    _hlsModal.on(Hls.Events.MANIFEST_PARSED, () => vid.play());
  } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
    vid.src = src; vid.play();
  }
  document.getElementById('modalVid').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function fermerVid() {
  document.getElementById('modalVid').classList.remove('open');
  const vid = document.getElementById('vidEl'); vid.pause(); vid.src = '';
  if (_hlsModal) { _hlsModal.destroy(); _hlsModal = null; }
  document.body.style.overflow = '';
}

function contacter() {
  if (!user.id) { location.href = '/connexion'; return; }
  location.href = `/messagerie?talent_id=${talentId}`;
}

function ouvrirUpgrade() {
  document.getElementById('upgradeOv').classList.add('open');
}
function fermerUpgrade() {
  document.getElementById('upgradeOv').classList.remove('open');
}

function partager(nom) {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({ title: nom + ' sur ShowOne', text: 'Découvrez le profil de ' + nom + ' sur ShowOne !', url });
  } else {
    navigator.clipboard.writeText(url).then(() => {
      alert('Lien copié !');
    });
  }
}

charger();
</script>
</body>
</html>
